<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>坊ノ岬沖海戦 ─ 戦況推移 / Interactive Battle Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;600;700;800&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Oswald:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#020508;
    --deep:#060c14;
    --abyss:#0a131e;
    --bone:#c8c0a6;
    --bone-dim:#807859;
    --bone-dark:#4b4532;
    --gold:#9a7a38;
    --gold-b:#c9a24a;
    --gold-bright:#e4bf6a;
    --blood:#8a2020;
    --blood-b:#c03030;
    --blood-bright:#e85050;
    --steel:#3d5668;
    --steel-b:#6a8598;
    --sea:#0c1a2a;
    --sea-deep:#040a12;
    --land:#14140e;
    --intact:#a8a89c;
    --damaged:#c9a24a;
    --heavy:#c03030;
    --crippled:#7a1515;
    --sunk:#2a2820;
  }

  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;overflow:hidden;user-select:none}
  body{
    background:var(--void);color:var(--bone);
    font-family:"Shippori Mincho",serif;
    background:
      radial-gradient(ellipse at 30% 20%,rgba(60,80,100,.08),transparent 50%),
      radial-gradient(ellipse at 70% 80%,rgba(138,32,32,.06),transparent 60%),
      linear-gradient(180deg,#020508,#050a14 50%,#020508);
  }

  /* フィルムグレイン */
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;z-index:100;
    background-image:repeating-linear-gradient(
      0deg,rgba(255,255,255,.012) 0 1px,transparent 1px 3px
    );
    mix-blend-mode:overlay;
  }

  /* ============= LAYOUT ============= */
  .app{
    display:grid;
    grid-template-columns:1fr 340px;
    grid-template-rows:54px 1fr 120px;
    grid-template-areas:
      "top top"
      "map side"
      "bottom bottom";
    height:100vh;
  }

  /* ============= TOP BAR ============= */
  .top{
    grid-area:top;display:flex;justify-content:space-between;align-items:center;
    padding:0 28px;border-bottom:1px solid rgba(154,122,56,.25);
    background:linear-gradient(180deg,rgba(2,5,8,.95),rgba(2,5,8,.5));
    backdrop-filter:blur(4px);z-index:10;
  }
  .title-group{display:flex;align-items:baseline;gap:18px}
  .title-jp{font-weight:700;letter-spacing:.3em;font-size:15px;color:var(--bone)}
  .title-en{font-family:"Oswald",sans-serif;font-weight:400;font-size:10px;color:var(--gold);letter-spacing:.5em;text-transform:uppercase}
  .title-date{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--bone-dim);letter-spacing:.3em}

  .top-stats{display:flex;align-items:center;gap:22px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.25em}
  .top-stat{display:flex;align-items:baseline;gap:8px}
  .top-stat .k{color:var(--bone-dark);font-size:9px}
  .top-stat .v{font-family:"Oswald",sans-serif;font-weight:500;font-size:16px;color:var(--gold-bright);letter-spacing:.05em}
  .top-stat .v.red{color:var(--blood-bright);font-weight:600}
  .top-stat .v.sunk-count{transition:color .6s,transform .6s}
  .top-stat .v.sunk-count.changed{transform:scale(1.15)}
  .sep{width:1px;height:24px;background:rgba(154,122,56,.25)}

  /* ============= MAP ============= */
  .map-wrap{
    grid-area:map;position:relative;overflow:hidden;
    background:var(--sea);
    background:
      radial-gradient(ellipse at 40% 50%,rgba(61,86,104,.12),transparent 60%),
      linear-gradient(180deg,#08121c,#040a14);
  }

  /* 海面の波紋レイヤー */
  .map-wrap::before{
    content:"";position:absolute;inset:0;pointer-events:none;
    background-image:
      radial-gradient(ellipse at 50% 65%,rgba(30,50,70,.2),transparent 50%);
    z-index:1;
  }

  .map-svg{position:absolute;inset:0;width:100%;height:100%}

  /* マップグリッド */
  .grid-layer line{stroke:rgba(106,133,152,.08);stroke-width:1}
  .grid-layer line.major{stroke:rgba(154,122,56,.12)}
  .grid-layer text{fill:rgba(106,133,152,.35);font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.15em}

  /* 九州 */
  .kyushu{fill:#0a0d0a;stroke:rgba(154,122,56,.28);stroke-width:1}
  .kyushu-label{fill:rgba(200,192,166,.35);font-family:"Shippori Mincho",serif;font-weight:600;font-size:14px;letter-spacing:.3em}
  .kyushu-label-en{fill:rgba(128,120,89,.4);font-family:"Oswald",sans-serif;font-size:9px;letter-spacing:.4em}
  .landmark-dot{fill:var(--gold-b)}
  .landmark-label{fill:var(--bone-dim);font-family:"Shippori Mincho",serif;font-size:11px;letter-spacing:.12em}
  .landmark-label-small{fill:var(--bone-dark);font-family:"JetBrains Mono",monospace;font-size:8px;letter-spacing:.2em}

  /* 航跡 */
  .wake{fill:none;stroke:rgba(106,133,152,.3);stroke-width:1;stroke-dasharray:2 4}
  .ship-trail{fill:none;stroke:rgba(200,192,166,.3);stroke-width:1;stroke-linecap:round}
  .ship-trail.sunk{stroke:rgba(192,48,48,.3)}

  /* 艦艇マーカー */
  .ship-marker{
    cursor:pointer;transition:opacity .4s;
  }
  .ship-marker .hull{
    transition:fill .6s,stroke .6s;
  }
  .ship-marker .label{
    fill:var(--bone);font-family:"Shippori Mincho",serif;font-weight:700;font-size:13px;letter-spacing:.1em;
    paint-order:stroke;stroke:rgba(2,5,8,.9);stroke-width:3;
    transition:fill .6s;
  }
  .ship-marker .label-en{
    fill:var(--bone-dim);font-family:"Oswald",sans-serif;font-size:8px;letter-spacing:.25em;
    paint-order:stroke;stroke:rgba(2,5,8,.9);stroke-width:3;
  }
  .ship-marker.sunk{opacity:.5}
  .ship-marker.sunk .label{fill:var(--blood-b);text-decoration:line-through}
  .ship-marker.sunk .label-en{fill:var(--crippled)}
  .ship-marker.focused .label,.ship-marker.focused .label-en{fill:var(--gold-bright)}
  .ship-marker.focused .hull{stroke:var(--gold-bright);stroke-width:2}

  /* 沈没マーカー */
  .sink-mark{
    animation:sinkIn 1.2s ease forwards;
  }
  .sink-mark line{stroke:var(--blood-b);stroke-width:1.5}
  .sink-mark circle{fill:none;stroke:var(--blood);stroke-width:1;opacity:.5}
  .sink-mark .time{fill:var(--blood-bright);font-family:"Oswald",sans-serif;font-size:10px;font-weight:500;letter-spacing:.15em}
  .sink-mark .name{fill:var(--blood-b);font-family:"Shippori Mincho",serif;font-size:11px;font-weight:700;letter-spacing:.1em}

  /* 攻撃ベクトル */
  .attack-vector{
    stroke:var(--blood-b);stroke-width:1;stroke-dasharray:3 4;
    opacity:0;transition:opacity .6s;
  }
  .attack-vector.active{opacity:.5;animation:pulse 1.8s ease infinite}

  /* ============= SIDE PANEL ============= */
  .side{
    grid-area:side;border-left:1px solid rgba(154,122,56,.25);
    background:linear-gradient(180deg,rgba(6,12,20,.85),rgba(2,5,8,.95));
    backdrop-filter:blur(6px);
    display:flex;flex-direction:column;overflow:hidden;z-index:5;
  }
  .side-header{
    padding:12px 18px;border-bottom:1px solid rgba(154,122,56,.2);
    font-family:"Oswald",sans-serif;font-size:10px;letter-spacing:.5em;
    color:var(--gold-bright);text-transform:uppercase;font-weight:500;
    display:flex;justify-content:space-between;align-items:center;
  }
  .ship-list{flex:1;overflow-y:auto;padding:8px}
  .ship-list::-webkit-scrollbar{width:4px}
  .ship-list::-webkit-scrollbar-thumb{background:rgba(154,122,56,.3)}

  .ship-row{
    padding:10px 12px;margin-bottom:4px;background:rgba(8,14,22,.5);
    border-left:2px solid var(--intact);position:relative;cursor:pointer;
    transition:background .3s,border-color .5s;
  }
  .ship-row:hover{background:rgba(20,28,40,.8)}
  .ship-row.focused{background:rgba(154,122,56,.1);border-left-color:var(--gold-bright)!important}
  .ship-row.sunk{opacity:.55}
  .ship-row.sunk .sr-name{text-decoration:line-through;text-decoration-color:rgba(192,48,48,.6)}
  .ship-row[data-status="damaged"]{border-left-color:var(--damaged)}
  .ship-row[data-status="heavy"]{border-left-color:var(--heavy)}
  .ship-row[data-status="crippled"]{border-left-color:var(--crippled)}
  .ship-row[data-status="sunk"]{border-left-color:var(--crippled)}

  .sr-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
  .sr-name{font-size:15px;font-weight:700;letter-spacing:.1em;color:var(--bone)}
  .sr-class{font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.2em;color:var(--bone-dark)}
  .sr-status{
    font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.2em;
    color:var(--intact);transition:color .5s;
  }
  .sr-hp{
    height:2px;background:rgba(128,120,89,.15);position:relative;overflow:hidden;margin-bottom:6px;
  }
  .sr-hp::after{
    content:"";position:absolute;left:0;top:0;bottom:0;
    background:var(--intact);width:var(--hp,100%);
    transition:width .6s cubic-bezier(.7,0,.3,1),background .5s;
  }
  .ship-row[data-status="damaged"] .sr-status,.ship-row[data-status="damaged"] .sr-hp::after{color:var(--damaged);background:var(--damaged)}
  .ship-row[data-status="heavy"] .sr-status,.ship-row[data-status="heavy"] .sr-hp::after{color:var(--heavy);background:var(--heavy)}
  .ship-row[data-status="crippled"] .sr-status,.ship-row[data-status="crippled"] .sr-hp::after{color:var(--crippled);background:var(--crippled)}
  .ship-row[data-status="sunk"] .sr-status{color:var(--crippled)}
  .ship-row[data-status="sunk"] .sr-hp::after{background:var(--sunk);width:0%}

  .sr-event{
    font-family:"Cormorant Garamond",serif;font-size:12px;line-height:1.5;color:var(--bone-dim);
    font-style:italic;letter-spacing:.02em;min-height:14px;
  }
  .sr-event.red{color:var(--blood-b);font-style:normal;font-weight:500}
  .sr-event.warn{color:var(--gold-b)}

  /* 艦詳細パネル(focus時) */
  .sr-detail{
    display:none;margin-top:8px;padding-top:8px;border-top:1px dashed rgba(154,122,56,.2);
    font-family:"JetBrains Mono",monospace;font-size:10px;line-height:1.8;color:var(--bone-dim);
    letter-spacing:.04em;
  }
  .ship-row.focused .sr-detail{display:block}
  .sr-detail .dk{color:var(--bone-dark);font-size:9px;letter-spacing:.2em}
  .sr-detail .dv{color:var(--bone)}
  .sr-detail .dv.red{color:var(--blood-bright)}

  /* ============= BOTTOM ============= */
  .bottom{
    grid-area:bottom;border-top:1px solid rgba(154,122,56,.25);
    background:linear-gradient(0deg,rgba(2,5,8,.98),rgba(2,5,8,.6));
    backdrop-filter:blur(6px);
    padding:14px 28px;display:flex;flex-direction:column;gap:10px;z-index:10;
  }

  .event-strip{
    display:flex;align-items:center;gap:18px;min-height:26px;
  }
  .event-time{
    font-family:"Oswald",sans-serif;font-weight:600;font-size:28px;
    color:var(--gold-bright);letter-spacing:.05em;line-height:1;flex-shrink:0;
  }
  .event-date{
    font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--bone-dark);letter-spacing:.3em;
  }
  .event-text{
    font-family:"Shippori Mincho",serif;font-size:14px;color:var(--bone);letter-spacing:.05em;line-height:1.5;
    flex:1;transition:color .3s;
  }
  .event-text.red{color:var(--blood-bright);font-weight:500}
  .event-text.warn{color:var(--gold-bright)}
  .event-text.calm{color:var(--bone-dim);font-style:italic}

  /* スライダー */
  .slider-wrap{
    position:relative;padding:22px 0 8px;
  }
  .slider-track-bg{
    position:absolute;left:0;right:0;top:32px;height:2px;
    background:linear-gradient(90deg,rgba(106,133,152,.15),rgba(106,133,152,.3),rgba(138,32,32,.3),rgba(106,133,152,.15));
  }
  .slider-progress{
    position:absolute;left:0;top:32px;height:2px;
    background:linear-gradient(90deg,var(--gold),var(--gold-bright),var(--blood-b));
    pointer-events:none;transition:width .05s linear;
  }
  /* イベントマーカー */
  .event-marker{
    position:absolute;top:28px;width:10px;height:10px;border-radius:50%;
    transform:translate(-50%,0);cursor:pointer;z-index:3;
    background:var(--gold);border:1px solid var(--gold-bright);
    transition:transform .2s,background .2s;
  }
  .event-marker.major{background:var(--blood);border-color:var(--blood-bright);width:12px;height:12px;top:27px}
  .event-marker:hover{transform:translate(-50%,0) scale(1.5);z-index:5}
  .event-marker .tip{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    background:rgba(2,5,8,.95);border:1px solid var(--line);padding:4px 10px;white-space:nowrap;
    font-family:"JetBrains Mono",monospace;font-size:9px;letter-spacing:.2em;
    color:var(--bone);opacity:0;pointer-events:none;transition:opacity .2s;
  }
  .event-marker:hover .tip{opacity:1}

  .slider{
    -webkit-appearance:none;appearance:none;width:100%;background:transparent;
    height:30px;cursor:pointer;position:relative;z-index:2;
  }
  .slider::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;
    background:var(--gold-bright);border:2px solid var(--void);cursor:pointer;
    box-shadow:0 0 12px rgba(228,191,106,.4);
    margin-top:-7px;
  }
  .slider::-moz-range-thumb{
    width:16px;height:16px;border-radius:50%;background:var(--gold-bright);border:2px solid var(--void);cursor:pointer;
    box-shadow:0 0 12px rgba(228,191,106,.4);
  }
  .slider::-webkit-slider-runnable-track{
    height:2px;background:transparent;
  }

  /* 時刻ラベル */
  .time-ticks{
    display:flex;justify-content:space-between;font-family:"JetBrains Mono",monospace;
    font-size:9px;color:var(--bone-dark);letter-spacing:.2em;margin-top:-2px;
  }

  /* プレイバックコントロール */
  .controls{
    display:flex;align-items:center;gap:14px;
  }
  .ctrl-btn{
    background:transparent;border:1px solid rgba(154,122,56,.3);color:var(--bone-dim);
    padding:5px 14px;font-family:"JetBrains Mono",monospace;font-size:10px;letter-spacing:.25em;
    cursor:pointer;transition:all .25s;
  }
  .ctrl-btn:hover{border-color:var(--gold-bright);color:var(--gold-bright)}
  .ctrl-btn.active{background:rgba(154,122,56,.15);border-color:var(--gold-b);color:var(--gold-bright)}
  .ctrl-btn.play{min-width:68px}

  .speed-group{display:flex;border:1px solid rgba(154,122,56,.2)}
  .speed-group .ctrl-btn{border:none;border-right:1px solid rgba(154,122,56,.15);padding:4px 10px}
  .speed-group .ctrl-btn:last-child{border-right:none}

  .hint{
    margin-left:auto;font-family:"JetBrains Mono",monospace;font-size:9px;color:var(--bone-dark);letter-spacing:.25em;
  }
  .hint kbd{
    display:inline-block;padding:2px 5px;border:1px solid var(--bone-dark);border-bottom-width:2px;
    margin:0 2px;color:var(--bone-dim);font-size:9px;
  }

  /* メモリアル */
  .memorial{
    position:absolute;right:360px;top:70px;z-index:5;
    max-width:240px;pointer-events:none;
  }
  .memorial-head{
    font-family:"Oswald",sans-serif;font-size:9px;letter-spacing:.5em;color:var(--blood-b);margin-bottom:8px;
    text-transform:uppercase;
  }
  .memorial-list{
    display:flex;flex-direction:column;gap:4px;
  }
  .memorial-item{
    padding:5px 10px;background:rgba(138,32,32,.12);border-left:2px solid var(--blood);
    font-family:"Shippori Mincho",serif;font-size:11px;color:var(--bone);letter-spacing:.1em;
    opacity:0;transform:translateX(10px);transition:opacity .6s,transform .6s;
    display:flex;justify-content:space-between;gap:12px;
  }
  .memorial-item.show{opacity:1;transform:translateX(0)}
  .memorial-item .mt{font-family:"JetBrains Mono",monospace;font-size:10px;color:var(--blood-bright)}

  /* アニメ */
  @keyframes pulse{
    0%,100%{opacity:.3}
    50%{opacity:.7}
  }
  @keyframes sinkIn{
    from{opacity:0;transform:scale(1.5)}
    to{opacity:1;transform:scale(1)}
  }

  @media (max-width:900px){
    .app{grid-template-columns:1fr;grid-template-areas:"top" "map" "side" "bottom";grid-template-rows:54px 40vh 30vh 130px}
    .side{border-left:none;border-top:1px solid rgba(154,122,56,.25)}
    .memorial{display:none}
    .title-en{display:none}
    .top-stats{gap:12px}
    .event-time{font-size:22px}
    .event-text{font-size:12px}
  }
</style>
</head>
<body>

<div class="app">
  <!-- ========== TOP BAR ========== -->
  <header class="top">
    <div class="title-group">
      <div class="title-jp">坊ノ岬沖海戦</div>
      <div class="title-en">BATTLE OFF CAPE BŌNO</div>
      <div class="title-date">1945.04.07</div>
    </div>
    <div class="top-stats">
      <div class="top-stat"><span class="k">FLEET</span><span class="v" id="stat-fleet">10</span></div>
      <div class="sep"></div>
      <div class="top-stat"><span class="k">LOST</span><span class="v red sunk-count" id="stat-lost">0</span></div>
      <div class="sep"></div>
      <div class="top-stat"><span class="k">KIA</span><span class="v red" id="stat-kia">0</span></div>
    </div>
  </header>

  <!-- ========== MAP ========== -->
  <div class="map-wrap">
    <svg class="map-svg" viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid meet">
      <!-- 格子 -->
      <g class="grid-layer" id="grid"></g>

      <!-- 九州 -->
      <g id="kyushu-group">
        <path class="kyushu" d="
          M 1200 40
          L 1100 60
          L 1080 140
          C 1070 180, 1050 200, 1060 240
          L 1020 270
          C 990 290, 970 310, 978 350
          C 985 380, 1000 400, 985 440
          C 970 480, 990 510, 1020 530
          C 1040 540, 1045 555, 1005 568
          C 990 572, 980 580, 985 592
          C 990 600, 1030 598, 1060 608
          C 1090 620, 1115 625, 1140 630
          L 1200 660
          Z"/>
        <!-- 九州ラベル -->
        <text class="kyushu-label" x="1100" y="400">九州</text>
        <text class="kyushu-label-en" x="1096" y="418">KYUSHU</text>

        <!-- ランドマーク -->
        <circle class="landmark-dot" cx="1005" cy="568" r="3"/>
        <text class="landmark-label" x="1010" y="565">坊ノ岬</text>
        <text class="landmark-label-small" x="1010" y="580">CAPE BŌNO</text>

        <circle class="landmark-dot" cx="920" cy="180" r="3"/>
        <text class="landmark-label" x="840" y="176">佐世保</text>
        <text class="landmark-label-small" x="840" y="190">SASEBO</text>

        <circle class="landmark-dot" cx="1080" cy="500" r="2.5"/>
        <text class="landmark-label" x="1088" y="503" style="font-size:10px">鹿児島</text>
      </g>

      <!-- 沖縄方向 -->
      <g opacity=".5">
        <line x1="380" y1="760" x2="440" y2="795" stroke="rgba(154,122,56,.4)" stroke-width="1" stroke-dasharray="3 4"/>
        <text x="280" y="780" fill="rgba(154,122,56,.6)" font-family="Shippori Mincho" font-size="11" letter-spacing=".12em">▼ 沖縄 500 km</text>
        <text x="280" y="794" fill="rgba(128,120,89,.5)" font-family="JetBrains Mono" font-size="9" letter-spacing=".2em">OBJECTIVE — OKINAWA</text>
      </g>

      <!-- 予定航路 (仮想) -->
      <path class="wake" d="M 870 240 Q 700 280, 550 340 Q 430 420, 380 760"/>

      <!-- 艦艇トレイル・攻撃ベクトル・沈没マーカー・艦マーカー -->
      <g id="attack-layer"></g>
      <g id="trail-layer"></g>
      <g id="sink-layer"></g>
      <g id="ship-layer"></g>
    </svg>

    <!-- メモリアル -->
    <div class="memorial">
      <div class="memorial-head">■ KILLED IN ACTION ■</div>
      <div class="memorial-list" id="memorial-list"></div>
    </div>
  </div>

  <!-- ========== SIDE PANEL ========== -->
  <aside class="side">
    <div class="side-header">
      <span>FLEET · 第一遊撃部隊</span>
      <span style="font-size:9px;color:var(--bone-dark)">伊藤整一 中将</span>
    </div>
    <div class="ship-list" id="ship-list"></div>
  </aside>

  <!-- ========== BOTTOM ========== -->
  <div class="bottom">

// ============================================================
// INTERPOLATION
// ============================================================
function interpTrack(track, t) {
  if (t <= track[0].t) return { x: track[0].x, y: track[0].y };
  if (t >= track[track.length-1].t) return { x: track[track.length-1].x, y: track[track.length-1].y };
  for (let i=0; i<track.length-1; i++) {
    if (t >= track[i].t && t <= track[i+1].t) {
      const a = track[i], b = track[i+1];
      const k = (t - a.t) / (b.t - a.t);
      return { x: a.x + (b.x - a.x) * k, y: a.y + (b.y - a.y) * k };
    }
  }
  return { x: track[0].x, y: track[0].y };
}

function getYamatoPos(t) { return interpTrack(YAMATO_TRACK, t); }

function getShipPos(id, t) {
  const ship = SHIPS[id];
  if (id === 'yamato') return getYamatoPos(t);

  // 停止後は、停止時の位置で固定
  const eff = ship.stopAt != null && t > ship.stopAt ? ship.stopAt : t;
  const yp = getYamatoPos(eff);
  return { x: yp.x + ship.offset.dx, y: yp.y + ship.offset.dy };
}

function getShipStatus(id, t) {
  const ship = SHIPS[id];
  let cur = { status:'intact', event:'', t:0 };
  for (const d of ship.damage) {
    if (d.t <= t) cur = d;
    else break;
  }
  return cur;
}

function getShipColor(status) {
  switch(status){
    case 'intact':   return '#b8b0a0';
    case 'damaged':  return '#c9a24a';
    case 'heavy':    return '#c03030';
    case 'crippled': return '#7a1515';
    case 'sunk':     return '#3a3028';
    default: return '#b8b0a0';
  }
}

function getHPPercent(status) {
  return {intact:100, damaged:70, heavy:40, crippled:15, sunk:0}[status] || 100;
}

function getStatusLabel(status) {
  return {intact:'健在', damaged:'小破', heavy:'大破', crippled:'航行不能', sunk:'沈没'}[status] || '';
}

      marker.setAttribute('transform', `translate(${pos.x},${pos.y})`);
      const hull = marker.querySelector('.hull');
      hull.setAttribute('fill', getShipColor(st.status));
      marker.classList.toggle('sunk', st.status === 'sunk');
      marker.classList.toggle('focused', focusedShip === id);
    }

    if (row) {
      row.dataset.status = st.status;
      row.classList.toggle('sunk', st.status === 'sunk');
      row.classList.toggle('focused', focusedShip === id);
      row.querySelector('[data-f="status"]').textContent = getStatusLabel(st.status);
      const hp = row.querySelector('.sr-hp');
      hp.style.setProperty('--hp', getHPPercent(st.status) + '%');
      const ev = row.querySelector('[data-f="event"]');
      ev.textContent = st.event || '────';
      ev.className = 'sr-event';
      if (['heavy','crippled','sunk'].includes(st.status)) ev.classList.add('red');
      else if (st.status === 'damaged') ev.classList.add('warn');

      // 詳細(focus時のみ)
      const detail = row.querySelector('[data-f="detail"]');
      if (s.kia) {
        if (st.status === 'sunk') {
          detail.innerHTML = `
            <div><span class="dk">沈没時刻</span> <span class="dv red">${s.kia.time || fmtTime(s.sunkAt)}</span></div>
            <div><span class="dk">直接要因</span> <span class="dv">${s.kia.weapon || '-'}</span></div>
            <div><span class="dk">攻撃元</span> <span class="dv">${s.kia.cause || '-'}</span></div>
            <div><span class="dk">沈没地点</span> <span class="dv">${s.kia.coord || '-'}</span></div>
            <div><span class="dk">戦死</span> <span class="dv red">${s.kia.total || '-'}名</span> <span class="dk">／ 生存</span> <span class="dv">${s.kia.saved || '-'}</span></div>
          `;
        } else if (s.survived) {
          detail.innerHTML = `<div><span class="dk">最終結果</span> <span class="dv">${s.kia.note || ''}</span> · 戦死${s.kia.total}名</div>`;
        } else {
          detail.innerHTML = `<div><span class="dk">STATUS</span> <span class="dv">戦闘中</span></div>`;
        }
      }
    }

    if (st.status === 'sunk') {
      sunkCount++;
      if (typeof s.kia?.total === 'number') totalKia += s.kia.total;
      if (!sunkOrder.find(x => x.id === id)) {
        sunkOrder.push({id, name:s.name, time:s.sunkAt, pos});
        newlySunk.push({id, name:s.name, time:s.sunkAt, pos});
      }
    } else {
      // 過去に沈没登録されていて、時刻を巻き戻した場合は除去
      sunkOrder = sunkOrder.filter(x => x.id !== id);
    }
  });

  // ---- 沈没マーカー更新 ----
  const sinkLayer = document.getElementById('sink-layer');
  sinkLayer.innerHTML = sunkOrder.map(s => `
    <g class="sink-mark" transform="translate(${s.pos.x},${s.pos.y})">
      <circle r="14"/>
      <line x1="-6" y1="-6" x2="6" y2="6"/>
      <line x1="6"  y1="-6" x2="-6" y2="6"/>
      <text class="time" x="10" y="-8">${fmtTime(s.time)}</text>
    </g>
  `).join('');

  // ---- メモリアル(戦死艦リスト) ----
  const mem = document.getElementById('memorial-list');
  mem.innerHTML = sunkOrder.map(s => {
    const ship = SHIPS[s.id];
    return `<div class="memorial-item show">
              <span>${s.name}</span>
              <span class="mt">${fmtTime(s.time)}</span>
            </div>`;
  }).join('');

  // ---- 戦況テキスト (現在時刻の最新イベント) ----
  let currentEvent = null;
  for (const ev of EVENTS) {
    if (ev.t <= t) currentEvent = ev;
    else break;
  }
  const evTime = document.getElementById('event-time');
  const evText = document.getElementById('event-text');
  evTime.textContent = fmtTime(t);
  if (currentEvent) {
    evText.textContent = `${currentEvent.label}：${currentEvent.text}`;
    evText.className = 'event-text';
    if (currentEvent.major) evText.classList.add('red');
    else if (t - currentEvent.t < 15) evText.classList.add('warn');
    else evText.classList.add('calm');
  } else {
    evText.textContent = '敵機との接触なし、艦隊は輪形陣で南西に進撃中';
    evText.className = 'event-text calm';
  }

  // ---- トップの統計 ----
  document.getElementById('stat-fleet').textContent = 10 - sunkCount;
  const lostEl = document.getElementById('stat-lost');
  const prevLost = parseInt(lostEl.textContent);
  lostEl.textContent = sunkCount;
  if (sunkCount !== prevLost) {
    lostEl.classList.add('changed');
    setTimeout(() => lostEl.classList.remove('changed'), 600);
  }
  // 累積戦死数 (沈没艦のみ積算)
  let kiaCumulative = 0;
  sunkOrder.forEach(s => {
    const k = SHIPS[s.id].kia?.total;
    if (typeof k === 'number') kiaCumulative += k;
    else if (typeof k === 'string') {
      const num = parseInt(k.replace(/[^0-9]/g,''));
      if (!isNaN(num)) kiaCumulative += num;
    }
  });
  document.getElementById('stat-kia').textContent = kiaCumulative.toLocaleString();

  // ---- スライダー進行バー ----
  const pct = ((t - T_START) / (T_END - T_START)) * 100;
  document.getElementById('slider-progress').style.width = pct + '%';

  // ---- 航跡(trail)描画 ----
  updateTrails(t);
}

function updateTrails(t) {
  const layer = document.getElementById('trail-layer');
  let html = '';
  Object.keys(SHIPS).forEach(id => {
    const s = SHIPS[id];
    // 過去の位置を一定間隔でサンプリング
    const points = [];
    const step = 10; // 分
    const endT = Math.min(t, s.stopAt != null ? s.stopAt : t);
    for (let tt = T_START; tt <= endT; tt += step) {
      const p = getShipPos(id, tt);
      points.push(`${p.x.toFixed(0)},${p.y.toFixed(0)}`);
    }
    // 停止地点を追加
    const p = getShipPos(id, endT);
    points.push(`${p.x.toFixed(0)},${p.y.toFixed(0)}`);
    if (points.length > 1) {
      const status = getShipStatus(id, t).status;
      const isSunk = status === 'sunk';
      html += `<polyline class="ship-trail ${isSunk?'sunk':''}" points="${points.join(' ')}" opacity="${isSunk?0.4:0.5}"/>`;
    }
  });
  layer.innerHTML = html;
}

// ============================================================
// SLIDER + PLAYBACK
// ============================================================
const slider = document.getElementById('slider');
slider.addEventListener('input', e => {
  currentT = parseFloat(e.target.value);
  sunkOrder = []; // 時刻巻き戻しに対応
  renderAt(currentT);
});

let isPlaying = false;
let playSpeed = 15; // min per second
let lastFrameT = 0;

function tick(now) {
  if (!isPlaying) return;
  if (!lastFrameT) lastFrameT = now;
  const dt = (now - lastFrameT) / 1000;
  lastFrameT = now;
  currentT += playSpeed * dt;
  if (currentT >= T_END) {
    currentT = T_END;
    stopPlay();
  }
  slider.value = currentT;
  renderAt(currentT);
  if (isPlaying) requestAnimationFrame(tick);
}

function startPlay() {
  if (currentT >= T_END) {
    currentT = T_START;
    sunkOrder = [];
    slider.value = currentT;
  }
  isPlaying = true;
  lastFrameT = 0;
  document.getElementById('btn-play').textContent = '❚❚ 一時停止';
  requestAnimationFrame(tick);
}

function stopPlay() {
  isPlaying = false;
  document.getElementById('btn-play').textContent = '▶ 再生';
}

document.getElementById('btn-play').addEventListener('click', () => {
  isPlaying ? stopPlay() : startPlay();
});
document.getElementById('btn-reset').addEventListener('click', () => {
  stopPlay();
  currentT = T_START;
  sunkOrder = [];
  slider.value = currentT;
  renderAt(currentT);
});

// 速度切替
document.querySelectorAll('.speed-group .ctrl-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    playSpeed = parseInt(btn.dataset.speed);
    document.querySelectorAll('.speed-group .ctrl-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// キーボード操作
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') {
    e.preventDefault();
    isPlaying ? stopPlay() : startPlay();
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (e.shiftKey) {
      // 次のイベントへ
      const next = EVENTS.find(ev => ev.t > currentT);
      if (next) { currentT = next.t; }
    } else {
      currentT = Math.min(T_END, currentT + 1);
    }
    sunkOrder = [];
    slider.value = currentT;
    renderAt(currentT);
  } else if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (e.shiftKey) {
      const prev = [...EVENTS].reverse().find(ev => ev.t < currentT);
      if (prev) { currentT = prev.t; }
    } else {
      currentT = Math.max(T_START, currentT - 1);
    }
    sunkOrder = [];
    slider.value = currentT;
    renderAt(currentT);
  }
});

// ============================================================
// INITIALIZATION
// ============================================================
renderGrid();
renderShipMarkers();
renderShipList();
renderEventMarkers();
renderAt(T_START);
</script>
